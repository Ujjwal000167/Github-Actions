name: auto linter

on:
  push: 
    paths: "*.py"
    #anything ends with .py , when pushed then it start

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout/clone the code
        uses: actions/checkout@v7
        #uses is a prebuild action that clone the current branch to runner
        #this step clone the code in container , we use use because there are any repo so ints difficult to give url every time(git clone http//;github........)
      - name: install linter tool of python
        run: pip install ruff
